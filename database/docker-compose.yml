version: '3.9'

# NexaMa — Docker Compose
# PostgreSQL 16 + Redis 7 + pgAdmin
# Référence : NEX-CDC-2025-001

services:
  # ============================================================
  # PostgreSQL 16 — Base principale ACID
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: nexama_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nexama_db
      POSTGRES_USER:     nexama_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexama_user -d nexama_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexama_net

  # ============================================================
  # Redis 7 — Cache sessions + API quotas + Pub/Sub
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: nexama_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexama_net

  # ============================================================
  # pgAdmin 4 — Interface d'administration PostgreSQL (dev only)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexama_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@nexama.ma}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-NexaAdmin2025!}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexama_net
    profiles:
      - dev     # only starts with: docker compose --profile dev up

# ============================================================
# Volumes persistants
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# Réseau isolé NexaMa
# ============================================================
networks:
  nexama_net:
    driver: bridge
    name: nexama_internal
